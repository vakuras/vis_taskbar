name: Release

on:
  push:
    tags:
      - 'v*'

permissions:
  contents: write

jobs:
  build:
    runs-on: windows-latest
    steps:
      - uses: actions/checkout@v4

      - name: Install Rust
        uses: dtolnay/rust-toolchain@stable

      - name: Run tests
        run: cargo test

      - name: Build release
        run: cargo build --release

      - name: Install Inno Setup
        run: choco install innosetup -y --no-progress

      - name: Build installer
        run: iscc installer.iss

      - name: Create portable ZIP
        run: |
          Compress-Archive -Path target\release\vis_taskbar.exe, icon.ico, README.md, LICENSE, CHANGELOG.md -DestinationPath vis_taskbar-${{ github.ref_name }}-windows-x64.zip

      - name: Create GitHub Release
        uses: softprops/action-gh-release@v2
        with:
          files: |
            vis_taskbar-setup.exe
            vis_taskbar-*-windows-x64.zip
          generate_release_notes: true
